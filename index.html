  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #fdfcf8; color: #333; font-family: 'Raleway', sans-serif; font-size: 17px; line-height: 1.7; overflow-x: hidden; }
    ::selection { background: rgba(255,153,0,0.25); }

    @keyframes bounceDown { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
    @keyframes shotIn { from{opacity:0;transform:rotate(-1.2deg) translateY(8px)} to{opacity:1;transform:rotate(-1.2deg) translateY(0)} }
    @keyframes txtIn  { from{opacity:0;transform:translateX(8px)}  to{opacity:1;transform:translateX(0)} }

    .section-paper {
      background-color: #faf6ef;
      background-image:
        radial-gradient(rgba(120,95,60,.05) 1px, transparent 1px),
        repeating-linear-gradient(0deg, rgba(120,95,60,.015) 0px, rgba(120,95,60,.015) 1px, transparent 1px, transparent 4px);
      background-size: 14px 14px, 100% 100%;
      position: relative;
    }
    .section-paper::before, .section-paper::after {
      content: ''; position: absolute; left: 0; right: 0; height: 14px; pointer-events: none; z-index: 1;
    }
    .section-paper::before { top: 0;    background: linear-gradient(180deg, rgba(0,0,0,.04), transparent); }
    .section-paper::after  { bottom: 0; background: linear-gradient(0deg,   rgba(0,0,0,.04), transparent); }
    .section-light { background: #fff; }
    .section-dark {
      background-color: #1f1d1b;
      background-image:
        radial-gradient(rgba(255,240,220,.025) 1px, transparent 1px),
        radial-gradient(rgba(255,153,0,.04)    1px, transparent 1px);
      background-size: 14px 14px, 28px 28px;
      background-position: 0 0, 7px 7px;
      color: #f5f0e8; position: relative;
    }
    .section-dark::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top, rgba(255,153,0,.04), transparent 70%);
      pointer-events: none;
    }
    .section { position: relative; }

    /* Section headers — used only on the polished (resolved) h2 */
    .section-header {
      font-family: 'Sanchez', serif; font-size: clamp(24px, 6vw, 36px); color: #333;
      margin-bottom: 0; position: relative; display: inline-block;
      letter-spacing: -0.01em; text-wrap: balance;
    }
    .section-header::after {
      content: ''; display: block; width: 44px; height: 3px;
      background: #ff9900; margin-top: 10px;
    }
    .section-header-dark { color: #f5f0e8; }

    .body-text { font-family: 'Raleway', sans-serif; font-size: 17px; color: #333; line-height: 1.8; text-wrap: pretty; }
    .body-text-dark { color: #d8d2c6; }

    .inline-link { color: #333; text-decoration: none; border-bottom: 1px solid #ff9900; transition: color .3s; }
    .inline-link-dark { color: #f5f0e8; }
    .hero-link { font-family: 'Raleway', sans-serif; font-size: 15px; font-weight: 500; color: #333; text-decoration: none; letter-spacing: .02em; transition: color .3s; }
    .footer-link { color: #888; text-decoration: none; transition: color .3s; }
    .floating-icon { transition: color .3s !important; text-decoration: none; }
    @media (hover: hover) and (pointer: fine) {
      .inline-link:hover { color: #ff9900; }
      .inline-link-dark:hover { color: #ffb84d; }
      .hero-link:hover { color: #ff9900; }
      .footer-link:hover { color: #ff9900; }
      .floating-icon:hover { color: #ff9900 !important; }
      .scroll-top-btn:hover::after { transform: translateX(-50%) scaleX(1); }
    }
    .scroll-top-btn { position: relative; }
    .scroll-top-btn::after {
      content: ''; position: absolute; bottom: 4px; left: 50%;
      transform: translateX(-50%) scaleX(0); width: 20px; height: 2px;
      background: #ff9900; transition: transform .3s; transform-origin: center;
    }

    .writing-card { padding: 22px 26px; border: 1px solid #eee; border-radius: 4px; transition: border-color .3s; }
    @media (hover: hover) and (pointer: fine) {
      .writing-card:hover { border-color: #ff9900; }
    }

    .substack-btn {
      font-family: 'Raleway', sans-serif; font-size: 15px; font-weight: 600;
      padding: 11px 24px; border-radius: 4px;
      border: 1px solid #ff9900; background: transparent;
      color: #ff9900; cursor: pointer; letter-spacing: 0.03em;
      transition: background 0.2s ease-out, color 0.2s ease-out;
    }
    @media (hover: hover) and (pointer: fine) {
      .substack-btn:hover { background: #ff9900; color: #fff; }
    }
    .writing-card-dark { border: 1px solid rgba(245,240,232,.12); background: rgba(245,240,232,.02); transition: border-color .3s, background .3s; }

    .project-card { padding: 36px; border: 1px solid rgba(180,150,100,.14); border-radius: 4px; background: #fff; box-shadow: 0 2px 16px rgba(160,120,60,.07); }

    .carousel-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(51,51,51,.18); background: transparent; color: #333;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: border-color .25s, color .25s, background .25s;
    }
    .carousel-btn:hover { border-color: #ff9900; color: #ff9900; background: rgba(255,153,0,.06); }
    .proud-shot { will-change: transform; }

    .topbar-icon {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 18px;
      transition: color .25s, background .25s; text-decoration: none;

    .topbar-icon:hover { color: #ff9900 !important; background: rgba(255,153,0,.08); }

    .annotation-note { pointer-events: none; }

    button:active { transform: scale(0.97); }

    /* Focus ring */
    :focus-visible { outline: 2px solid #ff9900; outline-offset: 3px; }

    @media (max-width: 768px) {
