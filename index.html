  <style>

    @keyframes bounceDown { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
    @keyframes shotIn { from{opacity:0;transform:rotate(-1.2deg) translateY(8px)} to{opacity:1;transform:rotate(-1.2deg) translateY(0)} }

    .section-paper {

    .section-paper::after  { bottom: 0; background: linear-gradient(0deg,   rgba(0,0,0,.04), transparent); }
    .section-light { background: #fff; }
    .section-dark {

        radial-gradient(rgba(255,240,220,.025) 1px, transparent 1px),

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>

  <script type="text/babel">
    // ── Constants ───────────────────────────────────────────────────────────────
    const REDUCED_MOTION = typeof window !== 'undefined' &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const FADE_MS = 360;

    // ── Font loading singleton ──────────────────────────────────────────────────
    // Kick off immediately so the font is likely ready by first render.
    const _fc = { font: null, promise: null };
    function loadCaveatFont() {
      if (_fc.font) return Promise.resolve(_fc.font);
      if (!_fc.promise) {
        _fc.promise = fetch('/Caveat.woff')
          .then(r => { if (!r.ok) throw new Error('font 404'); return r.arrayBuffer(); })
          .then(buf => { _fc.font = opentype.parse(buf); return _fc.font; });
      }
      return _fc.promise;
    }
    loadCaveatFont();

    // ── Path utilities ──────────────────────────────────────────────────────────
    function cmdsToD(cmds) {
      let d = '';
      for (const c of cmds) {
        switch (c.type) {
          case 'M': d += `M${c.x.toFixed(1)},${c.y.toFixed(1)}`; break;
          case 'L': d += `L${c.x.toFixed(1)},${c.y.toFixed(1)}`; break;
          case 'C': d += `C${c.x1.toFixed(1)},${c.y1.toFixed(1)} ${c.x2.toFixed(1)},${c.y2.toFixed(1)} ${c.x.toFixed(1)},${c.y.toFixed(1)}`; break;
          case 'Q': d += `Q${c.x1.toFixed(1)},${c.y1.toFixed(1)} ${c.x.toFixed(1)},${c.y.toFixed(1)}`; break;
          case 'Z': d += 'Z'; break;
        }
      }
      return d;
    }

    // Returns { glyphDs, width, height }
    // One SVG path string per non-space glyph, positioned correctly.
    function buildGlyphPaths(font, text, fontSize) {
      const scale = fontSize / font.unitsPerEm;
      const baseline = font.ascender * scale;
      const height = (font.ascender - font.descender) * scale;
      const glyphs = font.stringToGlyphs(text);
      const glyphDs = [];
      let x = 0;
      for (let i = 0; i < glyphs.length; i++) {
        const g = glyphs[i];
        const kern = i < glyphs.length - 1
          ? (font.getKerningValue(g, glyphs[i + 1]) || 0) * scale : 0;
        if (g.unicode !== 32) {
          const p = g.getPath(x, baseline, fontSize);
          const d = cmdsToD(p.commands);
          if (d) glyphDs.push(d);
        }
        x += (g.advanceWidth || 0) * scale + kern;
      }
      return { glyphDs, width: x, height };
    }

    // ── runTrace: animate a mounted SVG's [data-g] paths ───────────────────────
    // Returns total animation duration in ms.
    function runTrace(svgEl, { stagger, glyphDuration }) {
      const pathEls = Array.from(svgEl.querySelectorAll('[data-g]'));
      if (!pathEls.length) return 0;
      let maxEnd = 0;
      pathEls.forEach((el, i) => {
        const len = el.getTotalLength();
        el.style.strokeDasharray = `${len}`;
        el.style.strokeDashoffset = `${len}`;
        const delay = i * stagger;
        if (delay + glyphDuration > maxEnd) maxEnd = delay + glyphDuration;
        el.animate(
          [{ strokeDashoffset: `${len}` }, { strokeDashoffset: '0' }],
          { duration: glyphDuration, easing: 'ease-out', delay, fill: 'forwards' }
        );
      });
      return maxEnd;
    }

    // ── GlyphTraceText ──────────────────────────────────────────────────────────
    // For inline text (hero tagline, "Hi, I'm", "Erik", "Dohnberg.").
    // children must be span-compatible content — NOT block elements like h2.
    //
    // trigger:
    //   'load'   — fires automatically on mount (after font ready + startDelay)
    //   'scroll' — fires when containerRef enters viewport (threshold 0.3)
    //   'manual' — fires when `active` prop becomes true
    const GlyphTraceText = ({
      text,
      fontSize,
      strokeColor = '#333333',
      strokeWidth = 2.5,
      stagger = 45,
      glyphDuration = 280,
      startDelay = 0,
      trigger = 'load',
      active = false,
      onComplete,
      children,           // resolved inline JSX
      style = {},
      className,
    }) => {
      const containerRef = React.useRef(null);
      const svgRef       = React.useRef(null);
      const triggered    = React.useRef(false);
      const [glyphData, setGlyphData] = React.useState(null);
      // 'hidden'  — font loading
      // 'ready'   — font loaded, waiting for trigger
      // 'tracing' — stroke-dashoffset animation running
      // 'fading'  — crossfade in progress
      // 'done'    — resolved text visible
      const [phase, setPhase] = React.useState('hidden');

      React.useEffect(() => {
        loadCaveatFont()
          .then(font => { setGlyphData(buildGlyphPaths(font, text, fontSize)); setPhase('ready'); })
          .catch(() => setPhase('done'));
      }, [text, fontSize]);

      const startTrace = React.useCallback(() => {
        if (triggered.current) return;
        triggered.current = true;
        if (REDUCED_MOTION) { setPhase('done'); onComplete?.(); return; }
        setTimeout(() => setPhase('tracing'), startDelay);
      }, [startDelay, onComplete]);

      // load trigger
      React.useEffect(() => {
        if (trigger === 'load' && phase === 'ready') startTrace();
      }, [trigger, phase, startTrace]);

      // scroll trigger
      React.useEffect(() => {
        if (trigger !== 'scroll' || phase !== 'ready') return;
        const el = containerRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { startTrace(); obs.disconnect(); } },
          { threshold: 0.3 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [trigger, phase, startTrace]);

      // manual trigger
      React.useEffect(() => {
        if (trigger === 'manual' && active && phase === 'ready') startTrace();
      }, [trigger, active, phase, startTrace]);

      // run animation when entering 'tracing'
      React.useEffect(() => {
        if (phase !== 'tracing' || !svgRef.current || !glyphData) return;
        const dur = runTrace(svgRef.current, { stagger, glyphDuration });
        if (!dur) { setPhase('done'); onComplete?.(); return; }
        const t = setTimeout(() => {
          setPhase('fading');
          setTimeout(() => { setPhase('done'); onComplete?.(); }, FADE_MS);
        }, dur + 30);
        return () => clearTimeout(t);
      }, [phase, glyphData, stagger, glyphDuration, onComplete]);

      if (phase === 'hidden') {
        return (
          <span ref={containerRef} className={className} style={{ ...style, visibility: 'hidden' }}>
            {children}
          </span>
        );
      }
      if (phase === 'done') {
        return (
          <span ref={containerRef} className={className} style={style}>
            {children}
          </span>
        );
      }

      const { glyphDs, width, height } = glyphData;
      return (
        <span ref={containerRef} className={className}
          style={{ position: 'relative', display: 'inline-block', ...style }}>
          {/* SVG glyph trace — provides the layout dimensions during animation */}
          <svg ref={svgRef}
            viewBox={`0 0 ${width.toFixed(1)} ${height.toFixed(1)}`}
            width={width} height={height}
            style={{
              display: 'block', overflow: 'visible',
              opacity: phase === 'fading' ? 0 : 1,
              transition: phase === 'fading' ? `opacity ${FADE_MS}ms ease` : 'none',
            }}
          >
            {glyphDs.map((d, i) => (
              <path key={i} data-g="1" d={d}
                fill="none" stroke={strokeColor} strokeWidth={strokeWidth}
                strokeLinecap="round" strokeLinejoin="round" />
            ))}
          </svg>
          {/* Resolved text — absolutely positioned over SVG, fades in during crossfade */}
          <span style={{
            position: 'absolute', top: 0, left: 0,
            opacity: phase === 'fading' ? 1 : 0,
            transition: `opacity ${FADE_MS}ms ease`,
            pointerEvents: 'none', whiteSpace: 'nowrap',
          }}>
            {children}
          </span>
        </span>
      );
    };

    // ── TracedSectionHeader ─────────────────────────────────────────────────────
    // Renders a proper h2.section-header with scroll-triggered glyph trace.
    // Uses a div wrapper so the h2 is always valid HTML.
    const TracedSectionHeader = ({ children, dark = false }) => {
      const text = typeof children === 'string' ? children : '';
      const wrapRef   = React.useRef(null);
      const svgRef    = React.useRef(null);
      const triggered = React.useRef(false);
      const [glyphData, setGlyphData] = React.useState(null);
      const [phase, setPhase] = React.useState('hidden');
      const strokeColor = dark ? '#f5f0e8' : '#333333';

      React.useEffect(() => {
        loadCaveatFont()
          .then(font => { setGlyphData(buildGlyphPaths(font, text, 36)); setPhase('ready'); })
          .catch(() => setPhase('done'));
      }, [text]);

      React.useEffect(() => {
        if (phase !== 'ready') return;
        const el = wrapRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !triggered.current) {
            triggered.current = true;
            if (REDUCED_MOTION) { setPhase('done'); obs.disconnect(); return; }
            setPhase('tracing');
            obs.disconnect();
          }
        }, { threshold: 0.3 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [phase]);

      React.useEffect(() => {
        if (phase !== 'tracing' || !svgRef.current || !glyphData) return;
        const dur = runTrace(svgRef.current, { stagger: 38, glyphDuration: 240 });
        if (!dur) { setPhase('done'); return; }
        const t = setTimeout(() => {
          setPhase('fading');
          setTimeout(() => setPhase('done'), FADE_MS);
        }, dur + 30);
        return () => clearTimeout(t);
      }, [phase, glyphData]);

      const h2Opacity = phase === 'done' ? 1 : phase === 'fading' ? 1 : 0;
      const svgOpacity = phase === 'fading' ? 0 : 1;

      return (
        <div ref={wrapRef} className="traced-header-wrap">
          {/* h2 always in DOM — provides layout and hosts ::after orange bar */}
          <h2 className={dark ? 'section-header section-header-dark' : 'section-header'}
            style={{
              opacity: h2Opacity,
              transition: phase === 'fading' ? `opacity ${FADE_MS}ms ease` : 'none',
            }}>
            {children}
          </h2>
          {/* SVG trace — absolutely overlays the h2 during animation */}
          {glyphData && (phase === 'tracing' || phase === 'fading') && (
            <svg ref={svgRef}
              viewBox={`0 0 ${glyphData.width.toFixed(1)} ${glyphData.height.toFixed(1)}`}
              style={{
                position: 'absolute', top: 0, left: 0,
                width: glyphData.width, height: glyphData.height,
                overflow: 'visible',
                opacity: svgOpacity,
                transition: phase === 'fading' ? `opacity ${FADE_MS}ms ease` : 'none',
              }}
            >
              {glyphData.glyphDs.map((d, i) => (
                <path key={i} data-g="1" d={d}
                  fill="none" stroke={strokeColor} strokeWidth={2}
                  strokeLinecap="round" strokeLinejoin="round" />
              ))}
            </svg>
          )}
        </div>
      );
    };

    // ── IteratedTitle ───────────────────────────────────────────────────────────
    // Renders: draft (traced) → strikethrough (drawn) → final (traced)
    const IteratedTitle = ({ draft, final, dark = false }) => {
      const wrapRef     = React.useRef(null);
      const draftSvgRef = React.useRef(null);
      const strikeRef   = React.useRef(null);
      const finalSvgRef = React.useRef(null);
      const triggered   = React.useRef(false);

      const [draftGD, setDraftGD] = React.useState(null);
      const [finalGD, setFinalGD] = React.useState(null);

      // 'idle' | 'tracing-draft' | 'fading-draft' | 'drafted'
      // | 'striking' | 'struck' | 'tracing-final' | 'fading-final' | 'done'
      const [stage, setStage] = React.useState('idle');
      const color = dark ? '#f5f0e8' : '#333333';
      const isDraftWriting = draft === 'Writing';

      React.useEffect(() => {
        loadCaveatFont().then(font => {
          setDraftGD(buildGlyphPaths(font, draft, 36));
          setFinalGD(buildGlyphPaths(font, final, 36));
        }).catch(() => setStage('done'));
      }, [draft, final]);

      // Scroll trigger
      React.useEffect(() => {
        if (!draftGD) return;
        const el = wrapRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !triggered.current) {
            triggered.current = true;
            if (REDUCED_MOTION) { setStage('done'); obs.disconnect(); return; }
            setTimeout(() => setStage('tracing-draft'), 600);
            obs.disconnect();
          }
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [draftGD]);

      // Animate draft trace
      React.useEffect(() => {
        if (stage !== 'tracing-draft' || !draftSvgRef.current || !draftGD) return;
        const dur = runTrace(draftSvgRef.current, { stagger: 38, glyphDuration: 240 });
        if (!dur) { setStage('drafted'); return; }
        const t = setTimeout(() => {
          setStage('fading-draft');
          setTimeout(() => setStage('drafted'), FADE_MS);
        }, dur + 30);
        return () => clearTimeout(t);
      }, [stage, draftGD]);

      // After draft resolves, start strikethrough
      React.useEffect(() => {
        if (stage !== 'drafted') return;
        const t = setTimeout(() => setStage('striking'), 350);
        return () => clearTimeout(t);
      }, [stage]);

      // Animate strikethrough
      React.useEffect(() => {
        if (stage !== 'striking' || !strikeRef.current) return;
        const path = strikeRef.current.querySelector('[data-strike]');
        if (!path) return;
        const len = path.getTotalLength();
        path.style.strokeDasharray = `${len}`;
        path.style.strokeDashoffset = `${len}`;
        path.animate(
          [{ strokeDashoffset: `${len}` }, { strokeDashoffset: '0' }],
          { duration: 600, easing: 'ease-out', fill: 'forwards' }
        );
        const t = setTimeout(() => setStage('struck'), 650);
        return () => clearTimeout(t);
      }, [stage]);

      // After struck, brief pause then start final
      React.useEffect(() => {
        if (stage !== 'struck') return;
        const t = setTimeout(() => setStage('tracing-final'), 250);
        return () => clearTimeout(t);
      }, [stage]);

      // Animate final trace
      React.useEffect(() => {
        if (stage !== 'tracing-final' || !finalSvgRef.current || !finalGD) return;
        const dur = runTrace(finalSvgRef.current, { stagger: 38, glyphDuration: 240 });
        if (!dur) { setStage('done'); return; }
        const t = setTimeout(() => {
          setStage('fading-final');
          setTimeout(() => setStage('done'), FADE_MS);
        }, dur + 30);
        return () => clearTimeout(t);
      }, [stage, finalGD]);

      const draftH2Opacity = (stage === 'drafted' || stage === 'striking' || stage === 'struck') ? 1
        : stage === 'fading-draft' ? 1 : 0;
      const draftSvgOpacity = stage === 'fading-draft' ? 0 : 1;

      const draftVisible = stage !== 'tracing-final' && stage !== 'fading-final' && stage !== 'done';
      const finalH2Opacity = stage === 'done' ? 1 : stage === 'fading-final' ? 1 : 0;
      const finalSvgOpacity = stage === 'fading-final' ? 0 : 1;
      const showFinalArea = stage === 'tracing-final' || stage === 'fading-final' || stage === 'done';

      return (
        <div ref={wrapRef} style={{ marginBottom: '28px' }}>
          {/* ── Draft row ── */}
          <div style={{
            display: 'inline-block', position: 'relative',
            opacity: draftVisible ? 1 : 0,
            maxHeight: draftVisible ? '120px' : '0',
            overflow: 'hidden',
            transition: !draftVisible ? 'opacity 0.35s ease, max-height 0.45s ease 0.1s' : 'none',
            marginBottom: draftVisible ? '6px' : 0,
          }}>
            {/* Resolved h2 — always in DOM for layout */}
            <h2 className={dark ? 'section-header section-header-dark' : 'section-header'}
              style={{
                display: 'inline-block', marginBottom: 0,
                opacity: draftH2Opacity,
                transition: stage === 'fading-draft' ? `opacity ${FADE_MS}ms ease` : 'none',
              }}>
              {draft}
            </h2>

            {/* Draft SVG trace — overlays h2 */}
            {draftGD && stage !== 'idle' && stage !== 'drafted' && stage !== 'striking' && stage !== 'struck' && (
              <svg ref={draftSvgRef}
                viewBox={`0 0 ${draftGD.width.toFixed(1)} ${draftGD.height.toFixed(1)}`}
                style={{
                  position: 'absolute', top: 0, left: 0,
                  width: draftGD.width, height: draftGD.height,
                  overflow: 'visible',
                  opacity: draftSvgOpacity,
                  transition: stage === 'fading-draft' ? `opacity ${FADE_MS}ms ease` : 'none',
                }}
              >
                {draftGD.glyphDs.map((d, i) => (
                  <path key={i} data-g="1" d={d}
                    fill="none" stroke={color} strokeWidth={2}
                    strokeLinecap="round" strokeLinejoin="round" />
                ))}
              </svg>
            )}

            {/* Strikethrough — drawn after draft resolves */}
            {(stage === 'striking' || stage === 'struck') && (
              <svg ref={strikeRef}
                viewBox={isDraftWriting ? '0 0 120 30' : '0 0 200 30'}
                style={{
                  position: 'absolute', top: '42%', left: '-4px',
                  width: 'calc(100% + 8px)', height: '30px',
                  overflow: 'visible', pointerEvents: 'none',
                  transform: 'translateY(-50%)',
                }}
              >
                <path data-strike="1"
                  d={isDraftWriting
                    ? 'M 5 18 Q 30 14, 60 16 Q 90 18, 115 14'
                    : 'M 5 18 Q 50 14, 100 17 Q 150 19, 195 14'}
                  fill="none" stroke="#ff9900" strokeWidth="3" strokeLinecap="round" />
              </svg>
            )}
          </div>

          {/* ── Final row ── */}
          {showFinalArea && (
            <div style={{ display: 'inline-block', position: 'relative' }}>
              <h2 className={dark ? 'section-header section-header-dark' : 'section-header'}
                style={{
                  display: 'inline-block', marginBottom: 0,
                  opacity: finalH2Opacity,
                  transition: stage === 'fading-final' ? `opacity ${FADE_MS}ms ease` : 'none',
                }}>
                {final}
              </h2>
              {finalGD && stage !== 'done' && (
                <svg ref={finalSvgRef}
                  viewBox={`0 0 ${finalGD.width.toFixed(1)} ${finalGD.height.toFixed(1)}`}
                  style={{
                    position: 'absolute', top: 0, left: 0,
                    width: finalGD.width, height: finalGD.height,
                    overflow: 'visible',
                    opacity: finalSvgOpacity,
                    transition: stage === 'fading-final' ? `opacity ${FADE_MS}ms ease` : 'none',
                  }}
                >
                  {finalGD.glyphDs.map((d, i) => (
                    <path key={i} data-g="1" d={d}
                      fill="none" stroke={color} strokeWidth={2}
                      strokeLinecap="round" strokeLinejoin="round" />
                  ))}
                </svg>
              )}
            </div>
          )}
        </div>
      );
    };

    // ── Sketchy path generators (annotations only — unchanged) ──────────────────
    const sketchyEllipsePath = (cx, cy, rx, ry, seed = 1) => {
      const rand = i => { const x = Math.sin(seed*9999+i*17.3)*10000; return (x-Math.floor(x))-.5; };
      const pts = 24;
      let d1='', d2='';
      for (let i=0; i<=pts; i++) {
        const t = (i/pts)*Math.PI*2;
        const w1 = 1+rand(i)*.06;
        d1 += (i===0?'M':'L')+(cx+Math.cos(t)*rx*w1+rand(i+100)*2.5).toFixed(1)+','+(cy+Math.sin(t)*ry*w1+rand(i+200)*2.5).toFixed(1)+' ';
        const t2 = t+.3, w2 = 1+rand(i+500)*.07;
        d2 += (i===0?'M':'L')+(cx+Math.cos(t2)*(rx+2)*w2+rand(i+600)*3).toFixed(1)+','+(cy+Math.sin(t2)*(ry+1)*w2+rand(i+700)*3).toFixed(1)+' ';
      }
      return { d1, d2 };
    };

    const sketchyUnderlinePath = (width, seed=1) => {
      const rand = i => { const x = Math.sin(seed*7777+i*13.7)*10000; return (x-Math.floor(x))-.5; };
      let d='';
      for (let i=0; i<=20; i++) { const x=(i/20)*width, y=4+rand(i)*3; d+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)+' '; }
      return d;
    };

    // ── SideNotedSpan (annotation helper — unchanged) ───────────────────────────
    const SideNotedSpan = ({ children, text, seed=1, color='#ff9900', side='auto' }) => {
      const targetRef = React.useRef(null);
      const [visible, setVisible] = React.useState(false);
      const [pos, setPos] = React.useState(null);

      React.useEffect(() => {
        const el = targetRef.current; if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setTimeout(() => setVisible(true), 200); obs.disconnect(); }
        }, { threshold: 0.4 });
        obs.observe(el); return () => obs.disconnect();
      }, []);

      const measure = React.useCallback(() => {
        const el = targetRef.current; if (!el) return;
        const r = el.getBoundingClientRect();
        const wordRect = { left:r.left, right:r.right, top:r.top, bottom:r.bottom, cx:r.left+r.width/2, cy:r.top+r.height/2 };
        let colL=wordRect.left, colR=wordRect.right, walker=el.parentElement;
        while (walker && walker!==document.body) {
          const cs=window.getComputedStyle(walker), mw=parseFloat(cs.maxWidth);
          if (!isNaN(mw)&&mw>0&&mw<window.innerWidth) { const wr=walker.getBoundingClientRect(); colL=wr.left; colR=wr.right; break; }
          walker=walker.parentElement;
        }
        const vw=window.innerWidth, gR=vw-colR, gL=colL, NO=28, MG=140;
        const nw=Math.min(180,Math.max(130,Math.max(gR,gL)-NO-16));
        let pref=side==='auto'?(wordRect.cx<(colL+colR)/2?'left':'right'):side;
        let use=pref, pl='side';
        if (pref==='right'&&gR<MG) { use=gL>=MG?'left':'right'; if(gL<MG)pl='below'; }
        else if (pref==='left'&&gL<MG) { use=gR>=MG?'right':'left'; if(gR<MG)pl='below'; }
        let nx, ny;
        if (pl==='side') {
          if (use==='right') { nx=colR+NO; ny=wordRect.cy-18; if(nx+nw>vw-12)nx=vw-nw-12; }
          else { nx=colL-NO-nw; ny=wordRect.cy-18; if(nx<12)nx=12; }
          setPos({ wordRect,noteX:nx,noteY:ny,sideUsed:use,placement:pl,noteWidth:nw });
        } else {
          const bw=Math.min(140,vw-24); nx=wordRect.cx-bw/2+50; ny=wordRect.bottom+32;
          if(nx+bw>vw-12)nx=vw-bw-12; if(nx<12)nx=12;
          setPos({ wordRect,noteX:nx,noteY:ny,sideUsed:use,placement:pl,noteWidth:bw });
        }
      }, [side]);

      React.useLayoutEffect(() => {
        measure();
        window.addEventListener('resize', measure);
        window.addEventListener('scroll', measure, { passive:true });
        const t=setTimeout(measure,600);
        return () => { window.removeEventListener('resize',measure); window.removeEventListener('scroll',measure); clearTimeout(t); };
      }, [measure]);

      return (
        <>
          <span ref={targetRef} style={{ position:'relative', display:'inline' }}>{children}</span>
          {pos && ReactDOM.createPortal(
            <div style={{ position:'fixed', top:0, left:0, width:'100vw', height:'100vh', pointerEvents:'none', zIndex:5 }}>
              <span className="annotation-note" style={{
                position:'absolute', left:pos.noteX+'px', top:pos.noteY+'px', width:pos.noteWidth+'px',
                fontFamily:"'Caveat', cursive", fontSize:'24px', color, lineHeight:1.15, pointerEvents:'none',
                opacity: visible?1:0,
                transform: visible?'rotate(-2deg)':'translateY(6px) rotate(-2deg)',
                transformOrigin: pos.sideUsed==='right'||pos.placement==='below'?'left center':'right center',
                textAlign: pos.placement==='below'?'left':(pos.sideUsed==='right'?'left':'right'),
                transition:'opacity 0.5s ease 0.9s, transform 0.5s ease 0.9s',
              }}>{text}</span>
            </div>,
            document.body
          )}
        </>
      );
    };

    // ── Annotation (circle / underline / crossout — unchanged) ─────────────────
    const Annotation = ({ type, text, delay=0, seed=1, children, color='#ff9900' }) => {
      const [visible, setVisible] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el=ref.current; if(!el) return;
        const floor=900, eff=Math.max(delay,floor);
        const obs=new IntersectionObserver(([e]) => {
          if(e.isIntersecting){setTimeout(()=>setVisible(true),eff);obs.disconnect();}
        },{ threshold:0.3 });
        obs.observe(el); return ()=>obs.disconnect();
      },[delay]);
      const ns={fontFamily:"'Caveat', cursive",fontSize:'20px',color,whiteSpace:'nowrap',pointerEvents:'none'};

      if (type==='circle') {
        const {d1,d2}=sketchyEllipsePath(100,40,92,32,seed), len=580;
        return (
          <span ref={ref} style={{position:'relative',display:'inline'}}>
            {children}
            <svg viewBox="0 0 200 80" style={{position:'absolute',top:'-22px',left:'-14px',width:'calc(100% + 28px)',height:'calc(100% + 44px)',pointerEvents:'none',overflow:'visible'}}>
              <path d={d1} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray={len} strokeDashoffset={visible?0:len}
                style={{transition:'stroke-dashoffset 0.7s cubic-bezier(0.4,0.1,0.6,0.9)',transform:'rotate(-2deg)',transformOrigin:'center',opacity:.9}}/>
              <path d={d2} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray={len} strokeDashoffset={visible?0:len}
                style={{transition:'stroke-dashoffset 0.7s cubic-bezier(0.4,0.1,0.6,0.9) 0.2s',transform:'rotate(-1.5deg)',transformOrigin:'center',opacity:.55}}/>
            </svg>
            {text&&<span className="annotation-note" style={{...ns,position:'absolute',top:'-44px',right:'-130px',opacity:visible?1:0,transform:visible?'translateY(0) rotate(-3deg)':'translateY(8px) rotate(-3deg)',transition:'opacity 0.5s ease 0.7s, transform 0.5s ease 0.7s'}}>
              {text} <span style={{display:'inline-block',transform:'rotate(45deg)'}}>↙</span>
            </span>}
          </span>
        );
      }
      if (type==='underline'||type==='arrow') {
        const d=sketchyUnderlinePath(200,seed);
        return (
          <SideNotedSpan text={text} seed={seed} color={color} side="auto">
            <span ref={ref} style={{position:'relative',display:'inline'}}>
              {children}
              <svg viewBox="0 0 200 12" preserveAspectRatio="none" style={{position:'absolute',bottom:'-6px',left:'0',width:'100%',height:'10px',pointerEvents:'none'}}>
                <path d={d} fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round"
                  strokeDasharray="220" strokeDashoffset={visible?0:220}
                  style={{transition:'stroke-dashoffset 0.55s cubic-bezier(0.4,0.1,0.6,0.9)'}}/>
              </svg>
            </span>
          </SideNotedSpan>
        );
      }
      return <span ref={ref}>{children}</span>;
    };

    // ── FadeSection ─────────────────────────────────────────────────────────────
    const FadeSection = ({ children, className, style, id, 'data-dark-section': dataDark }) => {
      const ref = React.useRef(null);
      const [visible, setVisible] = React.useState(false);
      React.useEffect(() => {
        const obs=new IntersectionObserver(([e])=>{ if(e.isIntersecting){setVisible(true);obs.disconnect();} },{threshold:.1});
        obs.observe(ref.current); return ()=>obs.disconnect();
      },[]);
      return (
        <section ref={ref} id={id} className={className} data-dark-section={dataDark}
          style={{ ...style, opacity:visible?1:0, transform:visible?'translateY(0)':'translateY(30px)', transition:'opacity 0.7s ease, transform 0.7s ease' }}>
          {children}
        </section>
      );
    };

    // ── SketchyCircle (trenchcoat annotation) ───────────────────────────────────
    const SketchyCircle = ({ text, delay=0, seed=7 }) => {
      const [visible, setVisible] = React.useState(false);
      React.useEffect(() => { const t=setTimeout(()=>setVisible(true),delay); return ()=>clearTimeout(t); }, [delay]);
      const {d1,d2}=sketchyEllipsePath(100,40,92,32,seed), len=580;
      return (
        <>
          <svg viewBox="0 0 200 80" style={{position:'absolute',top:'-22px',left:'-14px',width:'calc(100% + 28px)',height:'calc(100% + 44px)',pointerEvents:'none',overflow:'visible'}}>
            <path d={d1} fill="none" stroke="#ff9900" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
              strokeDasharray={len} strokeDashoffset={visible?0:len}
              style={{transition:'stroke-dashoffset 0.7s cubic-bezier(0.4,0.1,0.6,0.9)',transform:'rotate(-2deg)',transformOrigin:'center',opacity:.9}}/>
            <path d={d2} fill="none" stroke="#ff9900" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
              strokeDasharray={len} strokeDashoffset={visible?0:len}
              style={{transition:'stroke-dashoffset 0.7s cubic-bezier(0.4,0.1,0.6,0.9) 0.2s',transform:'rotate(-1.5deg)',transformOrigin:'center',opacity:.55}}/>
          </svg>
          <span className="annotation-note" style={{
            position:'absolute',top:'-44px',right:'-130px',
            fontFamily:"'Caveat', cursive",fontSize:'20px',color:'#ff9900',whiteSpace:'nowrap',pointerEvents:'none',
            opacity:visible?1:0, transform:visible?'translateY(0) rotate(-3deg)':'translateY(8px) rotate(-3deg)',
            transition:'opacity 0.5s ease 0.7s, transform 0.5s ease 0.7s',
          }}>
            {text} <span style={{display:'inline-block',transform:'rotate(45deg)'}}>↙</span>
          </span>
        </>
      );
    };

    // The "trenchcoat" word with its delayed underline + circle — mounts in resolved state of line 2
    const TrenchcoatWord = () => {
      const ulRef = React.useRef(null);
      const [showCircle, setShowCircle] = React.useState(false);
      const ulPath = sketchyUnderlinePath(100, 9);

      React.useEffect(() => {
        // Underline draws in shortly after mount (resolved text just faded in)
        const t1 = setTimeout(() => {
          if (ulRef.current) {
            const path = ulRef.current.querySelector('[data-ul]');
            if (path) {
              const len = path.getTotalLength();
              path.style.strokeDasharray = `${len}`;
              path.style.strokeDashoffset = `${len}`;
              path.animate([{strokeDashoffset:`${len}`},{strokeDashoffset:'0'}],
                {duration:600,easing:'ease-out',fill:'forwards'});
            }
          }
        }, 200);
        const t2 = setTimeout(() => setShowCircle(true), 800);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      return (
        <span ref={ulRef} style={{ position:'relative', display:'inline-block' }}>
          trenchcoat
          <svg viewBox="0 0 100 8" preserveAspectRatio="none"
            style={{ position:'absolute', bottom:'-3px', left:'-2px', width:'calc(100% + 4px)', height:'8px', pointerEvents:'none', overflow:'visible' }}>
            <path data-ul="1" d={ulPath} fill="none" stroke="#ff9900" strokeWidth="2" strokeLinecap="round" />
          </svg>
          {showCircle && <SketchyCircle text='"yes, really"' delay={0} />}
        </span>
      );
    };

    // ── Hero ────────────────────────────────────────────────────────────────────
    const Hero = () => {
      // stage: which elements have been triggered
      // 0 = start "Hi, I'm"
      // 1 = "Hi, I'm" done → start "Erik"
      // 2 = "Erik" done → start "Dohnberg." + draw underline
      // 3 = "Dohnberg." done → start tagline line 1
      // 4 = tagline line 1 done → start tagline line 2
      // 5 = tagline line 2 done → show links + scroll hint
      const [stage, setStage] = React.useState(0);
      const [erikSettled, setErikSettled] = React.useState(false);
      const ulRef = React.useRef(null);

      const heroSize = React.useMemo(
        () => Math.min(80, Math.max(52, window.innerWidth * 0.08)),
        []
      );
      const ulPath = React.useMemo(() => sketchyUnderlinePath(200, 4), []);

      // Animate the underline under "Erik" once Erik resolves
      React.useEffect(() => {
        if (!erikSettled || !ulRef.current) return;
        const path = ulRef.current.querySelector('[data-ul]');
        if (!path) return;
        const len = path.getTotalLength();
        path.style.strokeDasharray = `${len}`;
        path.style.strokeDashoffset = `${len}`;
        path.animate(
          [{ strokeDashoffset: `${len}` }, { strokeDashoffset: '0' }],
          { duration: 700, easing: 'ease-out', delay: 100, fill: 'forwards' }
        );
      }, [erikSettled]);

      return (
        <header style={{ minHeight:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 10vw', position:'relative' }}>
          <div style={{ maxWidth:'800px', width:'100%' }}>

            {/* ── "Hi, I'm" ── */}
            <div style={{ marginBottom:'8px', minHeight:'36px' }}>
              <GlyphTraceText
                text="Hi, I'm"
                fontSize={22}
                strokeColor="#333333"
                strokeWidth={1.8}
                stagger={40}
                glyphDuration={200}
                trigger="load"
                startDelay={400}
                onComplete={() => setStage(1)}
              >
                <span style={{ fontFamily:"'Sanchez', serif", fontSize:'22px' }}>Hi, I'm</span>
              </GlyphTraceText>
            </div>

            {/* ── "Erik Dohnberg." ── */}
            <h1 style={{ fontSize:'0', lineHeight:1.1, marginBottom:'20px', whiteSpace:'nowrap' }}>
              {/* Erik */}
              <span style={{ display:'inline-block', minHeight:`clamp(58px, 9vw, 90px)`, position:'relative', verticalAlign:'baseline' }}>
                {stage >= 1 && (
                  <span style={{ position:'relative', display:'inline-block' }}>
                    <GlyphTraceText
                      text="Erik"
                      fontSize={heroSize}
                      strokeColor="#ff9900"
                      strokeWidth={3}
                      stagger={55}
                      glyphDuration={320}
                      trigger="load"
                      startDelay={150}
                      onComplete={() => { setErikSettled(true); setStage(2); }}
                    >
                      <span style={{ fontFamily:"'Sanchez', serif", fontSize:`clamp(52px, 8vw, 80px)`, color:'#ff9900', letterSpacing:'-0.01em', lineHeight:1 }}>
                        Erik
                      </span>
                    </GlyphTraceText>
                    {/* Underline beneath "Erik" — drawn in after Erik resolves */}
                    <svg ref={ulRef} viewBox="0 0 200 14" preserveAspectRatio="none"
                      style={{ position:'absolute', bottom:'-6px', left:'-4px', width:'calc(100% + 8px)', height:'14px', pointerEvents:'none', overflow:'visible' }}>
                      <path data-ul="1" d={ulPath} fill="none" stroke="#333333" strokeWidth="2.6" strokeLinecap="round" />
                    </svg>
                  </span>
                )}
              </span>

              {/* Space between Erik and Dohnberg */}
              <span style={{ fontSize:`clamp(52px, 8vw, 80px)`, display:'inline-block', verticalAlign:'baseline' }}>{' '}</span>

              {/* Dohnberg. */}
              <span style={{ display:'inline-block', minHeight:`clamp(58px, 9vw, 90px)`, position:'relative', verticalAlign:'baseline' }}>
                {stage >= 2 && (
                  <GlyphTraceText
                    text="Dohnberg."
                    fontSize={heroSize}
                    strokeColor="#333333"
                    strokeWidth={3}
                    stagger={50}
                    glyphDuration={280}
                    trigger="load"
                    startDelay={100}
                    onComplete={() => setStage(3)}
                  >
                    <span style={{ fontFamily:"'Sanchez', serif", fontSize:`clamp(52px, 8vw, 80px)`, letterSpacing:'-0.01em', lineHeight:1 }}>
                      Dohnberg.
                    </span>
                  </GlyphTraceText>
                )}
              </span>
            </h1>

            {/* ── Tagline ── */}
            <div style={{ position:'relative', maxWidth:'600px', minHeight:'90px' }}>
              {stage >= 3 && (
                <div>
                  {/* Line 1 */}
                  <div style={{ lineHeight:1.6 }}>
                    <GlyphTraceText
                      text="Every industry thinks its problems are unique."
                      fontSize={20}
                      strokeColor="#333333"
                      strokeWidth={1.6}
                      stagger={28}
                      glyphDuration={180}
                      trigger="load"
                      startDelay={300}
                      onComplete={() => setStage(4)}
                    >
                      <span style={{ fontFamily:"'Raleway', sans-serif", fontSize:'20px', lineHeight:1.6 }}>
                        Every industry thinks its problems are unique.
                      </span>
                    </GlyphTraceText>
                  </div>

                  {/* Line 2 */}
                  {stage >= 4 && (
                    <div style={{ lineHeight:1.6, marginTop:'4px' }}>
                      <GlyphTraceText
                        text="They're mostly the same problems in a trenchcoat."
                        fontSize={20}
                        strokeColor="#333333"
                        strokeWidth={1.6}
                        stagger={28}
                        glyphDuration={180}
                        trigger="load"
                        startDelay={200}
                        onComplete={() => setStage(5)}
                      >
                        <span style={{ fontFamily:"'Raleway', sans-serif", fontSize:'20px', lineHeight:1.6 }}>
                          They're mostly the same problems in a{' '}
                          <TrenchcoatWord />.
                        </span>
                      </GlyphTraceText>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* ── Links ── */}
            <div style={{
              display:'flex', gap:'20px', marginTop:'40px',
              opacity: stage >= 5 ? 1 : 0,
              transform: stage >= 5 ? 'translateY(0)' : 'translateY(8px)',
              transition: 'opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s',
            }}>
              <a href="https://linkedin.com/in/erikdohnberg" target="_blank" rel="noopener" className="hero-link">LinkedIn ↗</a>
              <a href="https://substack.com/@heyerikd"      target="_blank" rel="noopener" className="hero-link">Substack ↗</a>
            </div>
          </div>

          {/* ── Scroll hint ── */}
          <div style={{
            position:'absolute', bottom:'40px', left:'50%', transform:'translateX(-50%)',
            opacity: stage >= 5 ? 0.4 : 0, transition:'opacity 0.8s ease 0.8s',
            fontFamily:"'Caveat', cursive", fontSize:'18px', color:'#333',
            display:'flex', flexDirection:'column', alignItems:'center', gap:'4px',
          }}>
            <span>scroll</span>
            <span style={{ animation:'bounceDown 1.6s ease-in-out infinite' }}>↓</span>
          </div>
        </header>
      );
    };

    // ── FloatingUI ──────────────────────────────────────────────────────────────
    const FloatingUI = () => {
      const [showScrollTop, setShowScrollTop] = React.useState(false);
      const [overDark, setOverDark] = React.useState(false);
      React.useEffect(() => {
        const h = () => {
          setShowScrollTop(window.scrollY > window.innerHeight*.8);
          const ds=document.querySelectorAll('[data-dark-section]'), by=window.innerHeight-60;
          let d=false; ds.forEach(s=>{const r=s.getBoundingClientRect();if(r.top<by&&r.bottom>by)d=true;}); setOverDark(d);
        };
        window.addEventListener('scroll',h,{passive:true}); h(); return ()=>window.removeEventListener('scroll',h);
      },[]);
      return (
        <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} aria-label="Scroll to top" className="floating-icon scroll-top-btn"
          style={{ position:'fixed',bottom:'28px',right:'28px',width:'40px',height:'40px',border:'none',
            background:overDark?'rgba(31,29,27,.85)':'rgba(255,255,255,.85)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
