  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: #ffffff;
      color: #333333;
      font-family: 'Raleway', sans-serif;
      font-size: 17px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    ::selection {
      background: rgba(255, 153, 0, 0.25);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes hwl-write {
      from {
        clip-path: inset(0 100% 0 0);
        -webkit-clip-path: inset(0 100% 0 0);
      }
      to {
        clip-path: inset(0 0% 0 0);
        -webkit-clip-path: inset(0 0% 0 0);
      }
    }

    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @keyframes shotIn {
      from { opacity: 0; transform: rotate(-1.2deg) translateY(8px); }
      to { opacity: 1; transform: rotate(-1.2deg) translateY(0); }
    }

    @keyframes txtIn {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .section-paper {
      background-color: #faf6ef;
      background-image:
        radial-gradient(rgba(120, 95, 60, 0.05) 1px, transparent 1px),
        repeating-linear-gradient(
          0deg,
          rgba(120, 95, 60, 0.015) 0px,
          rgba(120, 95, 60, 0.015) 1px,
          transparent 1px,
          transparent 4px
        );
      background-size: 14px 14px, 100% 100%;
      position: relative;
    }
    .section-paper::before,
    .section-paper::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 14px;
      pointer-events: none;
      z-index: 1;
    }
    .section-paper::before {
      top: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.04), transparent);
    }
    .section-paper::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.04), transparent);
    }

    .section-light {
      background: #ffffff;
    }

    .section-dark {
      background-color: #1f1d1b;
      background-image:
        radial-gradient(rgba(255, 240, 220, 0.025) 1px, transparent 1px),
        radial-gradient(rgba(255, 153, 0, 0.04) 1px, transparent 1px);
      background-size: 14px 14px, 28px 28px;
      background-position: 0 0, 7px 7px;
      color: #f5f0e8;
      position: relative;
    }
    .section-dark::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at top, rgba(255, 153, 0, 0.04), transparent 70%);

    .section {
      position: relative;

    .section-header {
      font-family: 'Sanchez', serif;
      font-size: 36px;
      color: #333333;
      margin-bottom: 28px;
      position: relative;
      display: inline-block;

    .section-header::after {
      content: '';

      width: 44px;
      height: 3px;
      background: #ff9900;
      margin-top: 10px;
    }
    .section-header-dark {
      color: #f5f0e8;
    }

    .body-text {
      font-family: 'Raleway', sans-serif;
      font-size: 17px;
      color: #333333;
      line-height: 1.8;
      text-wrap: pretty;
    }
    .body-text-dark {
      color: #d8d2c6;
    }

    .inline-link {
      color: #333333;
      text-decoration: none;
      border-bottom: 1px solid #ff9900;
      transition: color 0.3s ease;
    }
    .inline-link:hover {
      color: #ff9900;
    }
    .inline-link-dark {
      color: #f5f0e8;
    }
    .inline-link-dark:hover {
      color: #ffb84d;
    }

    .hero-link {
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #333333;
      text-decoration: none;
      letter-spacing: 0.02em;

    .footer-link {

      text-decoration: none;

    .floating-icon {

    .scroll-top-btn {

      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);

      height: 2px;
      background: #ff9900;

    .writing-card {

    .writing-card-dark {
      border: 1px solid rgba(245, 240, 232, 0.12);
      background: rgba(245, 240, 232, 0.02);
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .writing-card-dark:hover {
      border-color: rgba(255, 153, 0, 0.6);
      background: rgba(255, 153, 0, 0.04);
    }

    .project-card {
      padding: 36px;
      border: 1px solid #eee;

    }

    .carousel-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(51, 51, 51, 0.18);
      background: transparent;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
    }
    .carousel-btn:hover {
      border-color: #ff9900;
      color: #ff9900;
      background: rgba(255, 153, 0, 0.06);
    }

    .proud-shot {
      will-change: transform;
    }

    .topbar-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 18px;
      transition: color 0.25s ease, background 0.25s ease;
      text-decoration: none;
    }
    .topbar-icon:hover {
      color: #ff9900 !important;
      background: rgba(255, 153, 0, 0.08);
    }

    .annotation-note {
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .annotation-note {
        display: none !important;
      }
      header {
        padding: 0 6vw !important;
      }
      .section {
        padding-left: 6vw !important;

      }
      .proud-carousel-grid {
        grid-template-columns: 1fr !important;

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ─── Sketchy Path Generators ──────────────────────────────────────────
    const sketchyEllipsePath = (cx, cy, rx, ry, seed = 1) => {
      const rand = (i) => {
        const x = Math.sin(seed * 9999 + i * 17.3) * 10000;
        return (x - Math.floor(x)) - 0.5;
      };
      const pts = 24;
      let d1 = '';
      for (let i = 0; i <= pts; i++) {
        const t = (i / pts) * Math.PI * 2;
        const wobbleR = 1 + rand(i) * 0.06;
        const x = cx + Math.cos(t) * rx * wobbleR + rand(i + 100) * 2.5;
        const y = cy + Math.sin(t) * ry * wobbleR + rand(i + 200) * 2.5;
        d1 += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      }
      let d2 = '';
      const offset = 0.3;
      for (let i = 0; i <= pts; i++) {
        const t = (i / pts) * Math.PI * 2 + offset;
        const wobbleR = 1 + rand(i + 500) * 0.07;
        const x = cx + Math.cos(t) * (rx + 2) * wobbleR + rand(i + 600) * 3;
        const y = cy + Math.sin(t) * (ry + 1) * wobbleR + rand(i + 700) * 3;
        d2 += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      }
      return { d1, d2 };
    };

    const sketchyUnderlinePath = (width, seed = 1) => {
      const rand = (i) => {
        const x = Math.sin(seed * 7777 + i * 13.7) * 10000;
        return (x - Math.floor(x)) - 0.5;
      };
      const pts = 20;
      let d = '';
      for (let i = 0; i <= pts; i++) {
        const x = (i / pts) * width;
        const y = 4 + rand(i) * 3;
        d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      }
      return d;
    };

    const sketchyStrikePath = (width, seed = 1) => {
      const rand = (i) => {
        const x = Math.sin(seed * 5555 + i * 11.1) * 10000;
        return (x - Math.floor(x)) - 0.5;
      };
      const pts = 14;
      let d = '';
      for (let i = 0; i <= pts; i++) {
        const x = -3 + (i / pts) * (width + 6);
        const y = 4 + rand(i) * 2.5;
        d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      }
      return d;
    };

    // ─── SideNotedSpan ────────────────────────────────────────────────────
    const SideNotedSpan = ({ children, text, seed = 1, color = '#ff9900', side = 'auto' }) => {
      const targetRef = React.useRef(null);
      const [visible, setVisible] = React.useState(false);
      const [pos, setPos] = React.useState(null);

      React.useEffect(() => {
        const el = targetRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setTimeout(() => setVisible(true), 200);
              obs.disconnect();
            }
          },
          { threshold: 0.4 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const measure = React.useCallback(() => {
        const el = targetRef.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        const wordRect = {
          left: r.left, right: r.right, top: r.top, bottom: r.bottom,
          cx: r.left + r.width / 2, cy: r.top + r.height / 2,
        };

        let columnLeft = wordRect.left;
        let columnRight = wordRect.right;
        let walker = el.parentElement;
        while (walker && walker !== document.body) {
          const cs = window.getComputedStyle(walker);
          const mw = parseFloat(cs.maxWidth);
          if (!isNaN(mw) && mw > 0 && mw < window.innerWidth) {
            const wr = walker.getBoundingClientRect();
            columnLeft = wr.left;
            columnRight = wr.right;
            break;
          }
          walker = walker.parentElement;
        }

        const vw = window.innerWidth;
        const gutterRight = vw - columnRight;
        const gutterLeft = columnLeft;
        const noteOffset = 28;
        const minGutter = 140;
        const noteWidth = Math.min(180, Math.max(130, Math.max(gutterRight, gutterLeft) - noteOffset - 16));

        let preferred = side;
        if (side === 'auto') {
          const colMid = (columnLeft + columnRight) / 2;
          preferred = wordRect.cx < colMid ? 'left' : 'right';
        }

        let useSide = preferred;
        let placement = 'side';
        if (preferred === 'right' && gutterRight < minGutter) {
          if (gutterLeft >= minGutter) useSide = 'left';
          else placement = 'below';
        } else if (preferred === 'left' && gutterLeft < minGutter) {
          if (gutterRight >= minGutter) useSide = 'right';
          else placement = 'below';
        }

        let noteX, noteY;
        if (placement === 'side') {
          if (useSide === 'right') {
            noteX = columnRight + noteOffset;
            noteY = wordRect.cy - 18;
            if (noteX + noteWidth > vw - 12) noteX = vw - noteWidth - 12;
          } else {
            noteX = columnLeft - noteOffset - noteWidth;
            noteY = wordRect.cy - 18;
            if (noteX < 12) noteX = 12;
          }
        } else {
          const belowWidth = Math.min(140, vw - 24);
          noteX = wordRect.cx - belowWidth / 2 + 50;
          noteY = wordRect.bottom + 32;
          if (noteX + belowWidth > vw - 12) noteX = vw - belowWidth - 12;
          if (noteX < 12) noteX = 12;
          setPos({ wordRect, noteX, noteY, sideUsed: useSide, placement, noteWidth: belowWidth });
          return;
        }
        setPos({ wordRect, noteX, noteY, sideUsed: useSide, placement, noteWidth });
      }, [side]);

      React.useLayoutEffect(() => {
        measure();
        const onResize = () => measure();
        const onScroll = () => measure();
        window.addEventListener('resize', onResize);
        window.addEventListener('scroll', onScroll, { passive: true });
        const t = setTimeout(measure, 600);
        return () => {
          window.removeEventListener('resize', onResize);
          window.removeEventListener('scroll', onScroll);
          clearTimeout(t);
        };
      }, [measure]);

      const targetSpan = (
        <span ref={targetRef} style={{ position: 'relative', display: 'inline' }}>
          {children}
        </span>
      );

      let noteEl = null;
      if (pos && text) {
        const { noteX, noteY, sideUsed, placement, noteWidth } = pos;
        noteEl = (
          <span
            className="annotation-note"
            style={{
              position: 'absolute',
              left: noteX + 'px',
              top: noteY + 'px',
              width: noteWidth + 'px',
              fontFamily: "'Caveat', cursive",
              fontSize: '24px',
              color: color,
              lineHeight: 1.15,
              pointerEvents: 'none',
              opacity: visible ? 1 : 0,
              transform: visible ? 'rotate(-2deg)' : 'translateY(6px) rotate(-2deg)',
              transformOrigin: sideUsed === 'right' || placement === 'below' ? 'left center' : 'right center',
              textAlign: placement === 'below' ? 'left' : (sideUsed === 'right' ? 'left' : 'right'),
              transition: 'opacity 0.5s ease 0.9s, transform 0.5s ease 0.9s',
            }}
          >
            {text}
          </span>
        );
      }

      return (
        <>
          {targetSpan}
          {pos && ReactDOM.createPortal(
            <div
              style={{
                position: 'fixed',
                top: 0, left: 0,
                width: '100vw', height: '100vh',
                pointerEvents: 'none',
                zIndex: 5,
              }}
            >
              {noteEl}
            </div>,
            document.body
          )}
        </>
      );
    };

    // ─── Annotation ───────────────────────────────────────────────────────
    const Annotation = ({ type, text, delay = 0, seed = 1, children, color = '#ff9900' }) => {
      const [visible, setVisible] = React.useState(false);
      const ref = React.useRef(null);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const FLOOR_MS = 900;
        const effectiveDelay = Math.max(delay, FLOOR_MS);
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setTimeout(() => setVisible(true), effectiveDelay);
              obs.disconnect();
            }
          },
          { threshold: 0.3 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [delay]);

      const noteStyle = {
        fontFamily: "'Caveat', cursive",
        fontSize: '20px',
        color: color,
        whiteSpace: 'nowrap',
        pointerEvents: 'none',
      };

      if (type === 'circle') {
        const { d1, d2 } = sketchyEllipsePath(100, 40, 92, 32, seed);
        const len = 580;
        return (
          <span ref={ref} style={{ position: 'relative', display: 'inline' }}>
            {children}
            <svg
              viewBox="0 0 200 80"
              style={{
                position: 'absolute', top: '-22px', left: '-14px',
                width: 'calc(100% + 28px)', height: 'calc(100% + 44px)',
                pointerEvents: 'none', overflow: 'visible',
              }}
            >
              <path d={d1} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray={len} strokeDashoffset={visible ? 0 : len}
                style={{ transition: 'stroke-dashoffset 0.7s cubic-bezier(0.4, 0.1, 0.6, 0.9)', transform: 'rotate(-2deg)', transformOrigin: 'center', opacity: 0.9 }} />
              <path d={d2} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray={len} strokeDashoffset={visible ? 0 : len}
                style={{ transition: 'stroke-dashoffset 0.7s cubic-bezier(0.4, 0.1, 0.6, 0.9) 0.2s', transform: 'rotate(-1.5deg)', transformOrigin: 'center', opacity: 0.55 }} />
            </svg>
            {text && (
              <span className="annotation-note" style={{
                ...noteStyle,
                position: 'absolute', top: '-44px', right: '-130px',
                opacity: visible ? 1 : 0,
                transform: visible ? 'translateY(0) rotate(-3deg)' : 'translateY(8px) rotate(-3deg)',
                transition: 'opacity 0.5s ease 0.7s, transform 0.5s ease 0.7s',
              }}>
                {text} <span style={{ display: 'inline-block', transform: 'rotate(45deg)' }}>↙</span>
              </span>
            )}
          </span>
        );
      }

      if (type === 'underline' || type === 'arrow') {
        const d = sketchyUnderlinePath(200, seed);
        return (
          <SideNotedSpan text={text} seed={seed} color={color} side="auto">
            <span ref={ref} style={{ position: 'relative', display: 'inline' }}>
              {children}
              <svg viewBox="0 0 200 12" preserveAspectRatio="none"
                style={{ position: 'absolute', bottom: '-6px', left: '0', width: '100%', height: '10px', pointerEvents: 'none' }}>
                <path d={d} fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round"
                  strokeDasharray="220" strokeDashoffset={visible ? 0 : 220}
                  style={{ transition: 'stroke-dashoffset 0.55s cubic-bezier(0.4, 0.1, 0.6, 0.9)' }} />
              </svg>
            </span>
          </SideNotedSpan>
        );
      }

      if (type === 'crossout') {
        const d = sketchyStrikePath(220, seed);
        return (
          <span ref={ref} style={{
            display: 'inline-block',
            fontFamily: "'Caveat', cursive", fontSize: '24px', color: color,
            position: 'relative',
            opacity: visible ? 0.75 : 0,
            transform: visible ? 'translateY(0) rotate(-1.5deg)' : 'translateY(6px) rotate(-1.5deg)',
            transformOrigin: 'left center',
            transition: 'opacity 0.5s ease, transform 0.5s ease',
            width: 'fit-content',
          }}>
            {text}
            <svg viewBox="0 0 220 10" preserveAspectRatio="none"
              style={{ position: 'absolute', top: '50%', left: '0', width: '100%', height: '10px', pointerEvents: 'none', transform: 'translateY(-2px)' }}>
              <path d={d} fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round"
                strokeDasharray="240" strokeDashoffset={visible ? 0 : 240}
                style={{ transition: 'stroke-dashoffset 0.6s cubic-bezier(0.4, 0.1, 0.6, 0.9) 0.4s' }} />
            </svg>
          </span>
        );
      }

      return <span ref={ref}>{children}</span>;
    };

    // ─── IteratedTitle ─────────────────────────────────────────────────────
    const IteratedTitle = ({ draft, final, dark = false, seed = 5 }) => {
      const wrapRef = React.useRef(null);
      const [stage, setStage] = React.useState(-1);
      const triggered = React.useRef(false);

      React.useEffect(() => {
        const el = wrapRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting && !triggered.current) {
              triggered.current = true;
              setTimeout(() => setStage(0), 750);
              obs.disconnect();
            }
          },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      React.useEffect(() => {
        if (stage === 0) {
          const t = setTimeout(() => setStage(1), 700);
          return () => clearTimeout(t);
        }
      }, [stage]);

      const strikeD = sketchyStrikePath(220, seed);

      return (
        <div ref={wrapRef} style={{ marginBottom: '28px', minHeight: '120px' }}>
          <div style={{
            position: 'relative',
            marginBottom: stage >= 1 ? '0px' : '6px',
            height: stage >= 1 ? '0px' : 'auto',
            opacity: stage >= 1 ? 0 : 1,
            overflow: 'visible',
            transition: 'height 0.5s ease 0.2s, opacity 0.45s ease 0.2s, margin-bottom 0.5s ease 0.2s',
          }}>
            <span style={{ display: 'inline-block', position: 'relative' }}>
              <h2 className={dark ? 'section-header section-header-dark' : 'section-header'}
                style={{ marginBottom: 0, display: 'inline-block' }}>
                {draft}
              </h2>
              <svg viewBox="0 0 220 10" preserveAspectRatio="none"

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setVisible(true);
              obs.disconnect();
            }
          },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      return (
        <section
          ref={ref}
          id={id}
          className={className}
          data-dark-section={dataDark}
          style={{
            ...style,
            opacity: visible ? 1 : 0,
            transform: visible ? 'translateY(0)' : 'translateY(30px)',
            transition: 'opacity 0.7s ease, transform 0.7s ease',

    const HandwrittenReveal = ({

      letterSpacing = '0', scriptLetterSpacing = '1px',

      const onCompleteRef = React.useRef(onComplete);
      React.useEffect(() => { onCompleteRef.current = onComplete; }, [onComplete]);

      const text = typeof children === 'string' ? children : React.Children.toArray(children).join('');

      React.useEffect(() => {
        const t1 = setTimeout(() => setStage(1), delay);
        const t2 = setTimeout(() => setStage(2), delay + duration);
        const t3 = setTimeout(() => {
          setStage(3);
          if (onCompleteRef.current) onCompleteRef.current();
        }, delay + duration + 350);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, [delay, duration]);

      const inking = stage === 1;
      const inked = stage >= 2;
      const resolved = stage >= 3;

      const chars = Array.from(text);
      const slotCount = Math.max(1, chars.length);
      const slot = duration / slotCount;
      const perChar = Math.max(80, slot * 1.3);

      return (
        <span style={{
          position: 'relative', display: 'inline-block',
          fontFamily: resolved ? resolvedFont : scriptFont,
          fontSize: resolved ? resolvedSize : (scriptSize || resolvedSize),
          color: resolved ? color : (scriptColor || color),
          letterSpacing: resolved ? letterSpacing : scriptLetterSpacing,
          lineHeight: lineHeight,
          transition: 'font-family 0.55s ease, font-size 0.55s ease, letter-spacing 0.55s ease, color 0.55s ease',
          whiteSpace: 'pre-wrap',
        }}>
          {resolved ? (
            children
          ) : (
            chars.map((ch, i) => {
              if (ch === ' ') return <span key={i} style={{ whiteSpace: 'pre' }}> </span>;
              const startAt = i * slot;
              const styleProps = inked
                ? { clipPath: 'none', WebkitClipPath: 'none' }
                : inking
                  ? {
                      animation: `hwl-write ${perChar}ms cubic-bezier(0.55, 0.1, 0.7, 0.9) ${startAt}ms forwards`,
                      clipPath: 'inset(0 100% 0 0)',
                      WebkitClipPath: 'inset(0 100% 0 0)',
                    }
                  : { clipPath: 'inset(0 100% 0 0)', WebkitClipPath: 'inset(0 100% 0 0)' };
              return (
                <span key={i} style={{ display: 'inline-block', ...styleProps }}>
                  {ch}
                </span>
              );
            })
          )}

            <text x="24" y="58" fill="#a08070" fontFamily="'Raleway', sans-serif" fontSize="11">contact lenses, made simple</text>
            <rect x="24" y="80" width="160" height="170" rx="8" fill="#fff" stroke="#e8d8c8" />
            <circle cx="104" cy="140" r="36" fill="#a8c8d8" opacity="0.4" />

            <text x="40" y="216" fill="#a08070" fontFamily="'Raleway', sans-serif" fontSize="10">30-day supply</text>
            <text x="40" y="234" fill={accent} fontFamily="'Sanchez', serif" fontSize="16" fontWeight="600">$28.00</text>
            <rect x="208" y="160" width="160" height="44" rx="22" fill={accent} />
            <text x="288" y="187" fill="#fff" fontFamily="'Raleway', sans-serif" fontSize="13" fontWeight="600" textAnchor="middle">Order now</text>
            <text x="208" y="100" fill="#3d2a1e" fontFamily="'Sanchez', serif" fontSize="20" fontWeight="600">Eyes feel good?</text>
            <text x="208" y="124" fill="#a08070" fontFamily="'Raleway', sans-serif" fontSize="12">Then your lenses are working.</text>
          </svg>
        );
      }
      return null;
    };

        body: (
          <>
            Built with the ML team to power both fully-generated galleries and admin-assisted curation, using internal similarity models for composition, colour, and subject matter. The fun part: training the system to match the editorial voice of titles like{' '}
            <Annotation type="arrow" text="yes, I named these" seed={9}>"Feeling Shady"</Annotation>
            {' '}and "Mellow Yellow."
          </>
        ),
        role: '— Senior PM at 500px, 2023.',
        link: { href: 'https://500px.com/explore', label: '→ 500px.com/explore' },
        accent: '#5b8aa8',
        screenshot: 'galleries',
      },
      {

        body: (
          <>
            Rebuilt a legacy e-commerce system into a warm, accessible consumer health experience.
            <br /><br />
            🏆 MarCom Gold Award — Medical Website Category, 2023
          </>
        ),
        role: '— Senior PM at Bounteous, 2022.',
        link: { href: 'https://helloabby.com', label: '→ helloabby.com' },
        accent: '#d68a6a',
        screenshot: 'abby',
      },
    ];

    const ProudWork = () => {
      const [idx, setIdx] = React.useState(0);
      const total = PROUD_WORK_PROJECTS.length;
      const project = PROUD_WORK_PROJECTS[idx];
      const next = () => setIdx((i) => (i + 1) % total);
      const prev = () => setIdx((i) => (i - 1 + total) % total);

      return (
        <FadeSection id="proud" className="section section-paper" style={{ padding: '120px 32px' }}>
          <div style={{ maxWidth: '880px', margin: '0 auto' }}>
            <IteratedTitle draft="Selected Work" final="Some work I'm proud of" seed={11} />
            <p className="body-text" style={{ marginBottom: '48px', marginTop: '8px', maxWidth: '640px' }}>
              A small selection. Real products that shipped, with real teams.
            </p>

            <div style={{
              display: 'grid',
              gridTemplateColumns: 'minmax(0, 1fr) minmax(0, 1fr)',
              gap: '48px',
              alignItems: 'start',
            }} className="proud-carousel-grid">
              <div style={{ position: 'relative' }}>
                <div key={idx + '-shot'} className="proud-shot" style={{
                  position: 'relative', aspectRatio: '4 / 3',
                  background: '#fff', padding: '14px 14px 38px',
                  boxShadow: '0 12px 32px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08)',
                  transform: 'rotate(-1.2deg)', transformOrigin: 'center',
                  animation: 'shotIn 0.5s ease',
                }}>
                  <div style={{ position: 'relative', width: '100%', height: '100%', overflow: 'hidden', background: '#1a1a1a' }}>
                    <ProjectScreenshot kind={project.screenshot} accent={project.accent} />

                  <span style={{
                    position: 'absolute', top: '-12px', left: '50%',
                    transform: 'translateX(-50%) rotate(-3deg)',
                    width: '70px', height: '22px',
                    background: 'rgba(255, 230, 180, 0.65)',
                    borderLeft: '1px dashed rgba(0,0,0,0.08)',
                    borderRight: '1px dashed rgba(0,0,0,0.08)',
                  }}></span>
                  <span style={{
                    position: 'absolute', bottom: '8px', left: '50%',
                    transform: 'translateX(-50%)',
                    fontFamily: "'Caveat', cursive", fontSize: '18px', color: '#666',
                    whiteSpace: 'nowrap',
                  }}>
                    {project.title.toLowerCase()}
                  </span>
                </div>
              </div>

              <div key={idx + '-txt'} style={{ animation: 'txtIn 0.5s ease' }}>
                <h3 style={{ fontFamily: "'Sanchez', serif", fontSize: '28px', color: '#333', margin: '0 0 6px' }}>
                  {project.title}
                </h3>
                <p style={{ fontFamily: "'Raleway', sans-serif", fontSize: '15px', color: '#999', fontStyle: 'italic', margin: '0 0 22px' }}>
                  {project.tagline}
                </p>
                <p className="body-text" style={{ marginBottom: '20px' }}>
                  {project.body}
                </p>
                <p style={{ fontFamily: "'Raleway', sans-serif", fontSize: '14px', color: '#888', margin: '0 0 16px', fontStyle: 'italic' }}>
                  {project.role}
                </p>
                <a href={project.link.href} target="_blank" rel="noopener" className="inline-link">
                  {project.link.label}
                </a>
              </div>
            </div>

            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              gap: '24px', marginTop: '56px',
            }}>
              <button onClick={prev} className="carousel-btn" aria-label="Previous">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
              </button>
              <div style={{ display: 'flex', gap: '10px' }}>
                {PROUD_WORK_PROJECTS.map((_, i) => (
                  <button key={i} onClick={() => setIdx(i)} aria-label={'Go to project ' + (i + 1)}
                    style={{
                      width: i === idx ? '28px' : '10px', height: '10px',
                      borderRadius: '5px',
                      background: i === idx ? '#ff9900' : 'rgba(51,51,51,0.25)',

              <button onClick={next} className="carousel-btn" aria-label="Next">

    // ─── Testimonials ─────────────────────────────────────────────────────

      <FadeSection id="testimonials" className="section section-dark" data-dark-section="true" style={{ padding: '120px 32px' }}>

          <h2 className="section-header section-header-dark">What it's like working with me</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '40px', marginTop: '24px' }}>
            {[
              { quote: "Erik is the glue that holds the place together. His enthusiasm infects the whole place with a sense of purpose.", name: "Kevin McLoughlin", title: "CPO at Dr.Bill" },
              { quote: "Can sling a pitch deck better than I've ever seen.", name: "Martin Laws", title: "Fractional CTO" },
              { quote: "His leadership style marries strategic vision with tactical expertise.", name: "Anas Herzallah", title: "Sales Manager (formerly Erik's report)" },
            ].map((t, i) => (
              <blockquote key={i} style={{ margin: 0, padding: '0 0 0 28px', borderLeft: '3px solid #ff9900' }}>
                <p style={{
                  fontFamily: "'Raleway', sans-serif", fontSize: '19px', color: '#f5f0e8',
                  lineHeight: 1.7, fontStyle: 'italic', margin: '0 0 10px', fontWeight: 300,
                }}>
                  "{t.quote}"
                </p>
                <footer style={{ fontFamily: "'Raleway', sans-serif", fontSize: '14px', color: '#9a958d' }}>
                  — {t.name}, {t.title}
                </footer>
              </blockquote>
            ))}
          </div>
        </div>
      </FadeSection>
    );

    // ─── Footer ───────────────────────────────────────────────────────────
    const Footer = () => {
      const [visible, setVisible] = React.useState(false);
      const ref = React.useRef(null);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setVisible(true);
              obs.disconnect();
            }
          },
          { threshold: 0.3 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      return (
        <footer ref={ref} className="section section-light" style={{
          padding: '100px 10vw 80px', textAlign: 'center',
          opacity: visible ? 1 : 0,
          transform: visible ? 'translateY(0)' : 'translateY(20px)',
          transition: 'opacity 0.8s ease, transform 0.8s ease',
        }}>
          <p style={{ fontFamily: "'Caveat', cursive", fontSize: '26px', color: '#333', marginBottom: '28px' }}>
            Built in Toronto 🇨🇦, fuelled by espresso ☕️, and built with AI 🤖

          <div style={{ display: 'flex', justifyContent: 'center', gap: '24px', fontFamily: "'Raleway', sans-serif", fontSize: '14px' }}>
            <a href="https://linkedin.com/in/erikdohnberg" target="_blank" rel="noopener" className="footer-link">LinkedIn</a>
            <span style={{ color: '#ccc' }}>·</span>
            <a href="https://substack.com/@heyerikd" target="_blank" rel="noopener" className="footer-link">Substack</a>
            <span style={{ color: '#ccc' }}>·</span>
            <a href="mailto:erikdohnberg@gmail.com" className="footer-link">erikdohnberg@gmail.com</a>
          </div>
        </footer>
      );
    };

    // ─── App ──────────────────────────────────────────────────────────────
    const App = () => (
      <div>
        <TopBar />
        <Hero />
        <About />
        <Writing />
        <SideProjects />
        <ProudWork />
        <Testimonials />
        <Footer />
        <FloatingUI />
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
